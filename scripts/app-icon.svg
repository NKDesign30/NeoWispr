<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0B3A26"/>
      <stop offset="55%"  stop-color="#05201A"/>
      <stop offset="100%" stop-color="#020F0B"/>
    </linearGradient>
    <linearGradient id="hl" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.55" r="0.7">
      <stop offset="55%"  stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#3FE39A" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#3FE39A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3FE39A" stop-opacity="0"/>
    </radialGradient>
    <filter id="pulseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>

    <path
      d="M 70 256 L 150 256 L 178 220 L 230 320 L 268 132 L 306 360 L 340 240 L 380 268 L 442 256"
      stroke="#3FE39A"
      stroke-opacity="0.18"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>

    <g filter="url(#pulseGlow)">
      <path
        d="M 70 256 L 150 256 L 178 220 L 230 320 L 268 132 L 306 360 L 340 240 L 380 268 L 442 256"
        stroke="#3FE39A"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
    </g>

    <circle cx="70"  cy="256" r="11" fill="#3FE39A"/>
    <circle cx="442" cy="256" r="11" fill="#3FE39A"/>

    <rect width="512" height="512" fill="url(#hl)"/>
    <rect width="512" height="512" fill="url(#vig)"/>
  </g>

  <rect x="0.5" y="0.5" width="511" height="511" rx="114.5" ry="114.5"
        fill="none" stroke="#3FE39A" stroke-opacity="0.16" stroke-width="1"/>
</svg>
